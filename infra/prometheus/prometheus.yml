# TarotFriend — Prometheus Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'tarot-reading'
    static_configs:
      - targets: ['host.docker.internal:3000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'customer-management'
    static_configs:
      - targets: ['host.docker.internal:3010']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'caring-service'
    static_configs:
      - targets: ['host.docker.internal:3020']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'shopping-cart'
    static_configs:
      - targets: ['host.docker.internal:3030']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'tarotist-scheduler'
    static_configs:
      - targets: ['host.docker.internal:3040']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'dal'
    static_configs:
      - targets: ['dal:4001']
    metrics_path: '/metrics'
    scrape_interval: 5s
