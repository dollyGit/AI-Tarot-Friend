# ============================================================
# TarotFriend — Root Docker Compose
# All infrastructure services for the platform
# ============================================================

services:
  # ── Databases ─────────────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    container_name: tarot-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7
    container_name: tarot-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tarot-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7
    container_name: tarot-influxdb
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: password123
      DOCKER_INFLUXDB_INIT_ORG: tarotfriend
      DOCKER_INFLUXDB_INIT_BUCKET: metrics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: tarot-influx-token
    ports:
      - '8086:8086'
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ['CMD', 'influx', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: tarot-qdrant
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:6333/healthz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: tarot-neo4j
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - '7474:7474'
      - '7687:7687'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'cypher-shell -u neo4j -p password123 "RETURN 1" || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Messaging ─────────────────────────────────────────────

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: tarot-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,HOST://0.0.0.0:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - '9092:9092'
    volumes:
      - kafka_data:/tmp/kraft-combined-logs
    healthcheck:
      test: ['CMD-SHELL', 'kafka-topics --bootstrap-server localhost:9092 --list || exit 1']
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Application Services ──────────────────────────────────

  dal:
    build:
      context: ./DataAccessLayer
      dockerfile: Dockerfile
    container_name: tarot-dal
    environment:
      PORT: '4000'
      METRICS_PORT: '4001'
      ENV: development
      TAROT_DB_URL: postgresql://postgres:password@postgres:5432/tarot_db
      CUSTOMER_DB_URL: postgresql://postgres:password@postgres:5432/customer_db
      CARING_DB_URL: postgresql://postgres:password@postgres:5432/caring_db
      SHOP_DB_URL: postgresql://postgres:password@postgres:5432/shop_db
      SCHEDULER_DB_URL: postgresql://postgres:password@postgres:5432/scheduler_db
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: kafka:29092
      OTLP_ENDPOINT: jaeger:4318
      CACHE_CONFIG_PATH: /app/configs/cache_config.yaml
    ports:
      - '4000:4000'
      - '4001:4001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:4001/health || exit 1']
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── Observability ─────────────────────────────────────────

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: tarot-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    ports:
      - '6831:6831/udp'
      - '16686:16686'
      - '14268:14268'
      - '4317:4317'
      - '4318:4318'

  prometheus:
    image: prom/prometheus:latest
    container_name: tarot-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  grafana:
    image: grafana/grafana:latest
    container_name: tarot-grafana
    ports:
      - '3100:3000'
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  influxdb_data:
  qdrant_data:
  neo4j_data:
  kafka_data:
  prometheus_data:
  grafana_data:
