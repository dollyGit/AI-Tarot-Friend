<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TarotFriend — 你的塔羅摯友</title>
<meta name="description" content="溫暖療癒的 AI 塔羅對話夥伴，陪你聊感情、職涯、未來的一切困惑">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        // GitKraken Teal Palette - 現代科技風
        void: '#1B1B1D',      // 主背景（中性深灰）
        abyss: '#252527',     // 卡片背景（略淺灰）
        nebula: '#2D2D30',    // Hover 狀態
        warmth: '#363638',    // 輸入框背景
        gold: '#00D4AA',      // 主強調色（Teal 青綠）
        ember: '#4DDFC4',     // 次強調色（亮青綠）
        orchid: '#7B68EE',    // AI 訊息強調（紫藍）
        rose: '#00BFA5',      // 情感狀態（深青綠）
        pale: '#FFFFFF',      // 主要文字（純白）
        ghost: '#9E9E9E',     // 次要文字（中灰）
      },
      fontFamily: {
        display: ['Cinzel Decorative', 'serif'],
        sans: ['Noto Sans TC', 'Inter', 'sans-serif'],
        mono: ['JetBrains Mono', 'monospace'],
      },
      animation: {
        'fade-in': 'fadeIn 0.3s ease-out',
        'fade-in-up': 'fadeInUp 0.4s ease-out',
        'pulse-slow': 'pulse 3s ease-in-out infinite',
        'float': 'float 6s ease-in-out infinite',
        'typing-1': 'typing 1.4s ease-in-out infinite',
        'typing-2': 'typing 1.4s ease-in-out 0.2s infinite',
        'typing-3': 'typing 1.4s ease-in-out 0.4s infinite',
      },
      keyframes: {
        fadeIn: {
          '0%': { opacity: '0' },
          '100%': { opacity: '1' },
        },
        fadeInUp: {
          '0%': { opacity: '0', transform: 'translateY(10px)' },
          '100%': { opacity: '1', transform: 'translateY(0)' },
        },
        float: {
          '0%, 100%': { transform: 'translateY(0)' },
          '50%': { transform: 'translateY(-8px)' },
        },
        typing: {
          '0%, 100%': { opacity: '0.3', transform: 'scale(0.8)' },
          '50%': { opacity: '1', transform: 'scale(1)' },
        },
      },
    },
  },
}
</script>

<style>
/* Base resets */
*, *::before, *::after { box-sizing: border-box; }
body { margin: 0; overflow: hidden; }

/* Scrollbar styling */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, #7B68EE, #00D4AA);
  border-radius: 3px;
}

/* Custom scrollbar for Firefox */
* { scrollbar-width: thin; scrollbar-color: #7B68EE transparent; }

/* Noise texture overlay */
.noise-overlay::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 9999;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.02'/%3E%3C/svg%3E");
  opacity: 0.3;
}

/* Emotion gradient backgrounds - GitKraken Teal 版 */
.emotion-calm { background: radial-gradient(ellipse at center, rgba(0,212,170,0.03) 0%, transparent 70%); }
.emotion-anxious { background: radial-gradient(ellipse at center, rgba(123,104,238,0.05) 0%, transparent 70%); }
.emotion-sad { background: radial-gradient(ellipse at center, rgba(123,104,238,0.04) 0%, transparent 70%); }
.emotion-hopeful { background: radial-gradient(ellipse at center, rgba(77,223,196,0.05) 0%, transparent 70%); }

/* Chat bubble styles - GitKraken Teal 版 */
.bubble-ai {
  background: linear-gradient(135deg, #2D2D30, #252527);
  border-left: 3px solid #7B68EE;
  border-radius: 4px 20px 20px 20px;
}

.bubble-user {
  background: linear-gradient(135deg, #363638, #2D2D30);
  border-right: 3px solid #00D4AA;
  border-radius: 20px 4px 20px 20px;
}

/* Input glow effect - GitKraken Teal 版 */
.input-glow:focus {
  box-shadow: 0 0 0 1px #00D4AA, 0 0 20px rgba(0,212,170,0.2);
}

/* Quick action pill - GitKraken Teal 版 */
.action-pill {
  transition: all 0.2s ease-out;
}
.action-pill:hover {
  background: rgba(0,212,170,0.15);
  transform: translateY(-1px);
}

/* Sigil animation - GitKraken Teal 版 */
.sigil-glow {
  filter: drop-shadow(0 0 20px rgba(0,212,170,0.4));
}

/* Card flip animation */
.card-flip {
  transform-style: preserve-3d;
  transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.card-flip.flipped { transform: rotateY(180deg); }
.card-front, .card-back { backface-visibility: hidden; position: absolute; inset: 0; }
.card-back { transform: rotateY(180deg); }

/* Tarot card spread styles */
.tarot-spread {
  display: flex;
  justify-content: center;
  gap: 0.5rem;
  perspective: 1000px;
  padding: 1rem 0;
}

.tarot-card {
  width: 80px;
  height: 130px;
  cursor: pointer;
  position: relative;
  transform-style: preserve-3d;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.tarot-card:hover:not(.selected):not(.disabled) {
  transform: translateY(-12px) scale(1.05);
  z-index: 10;
}

.tarot-card:hover:not(.selected):not(.disabled) .card-inner {
  box-shadow: 0 15px 40px rgba(0, 212, 170, 0.35);
}

.tarot-card.disabled {
  opacity: 0.4;
  cursor: default;
  pointer-events: none;
}

.tarot-card.selected .card-inner {
  transform: rotateY(180deg);
}

.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  border-radius: 8px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

.card-front {
  background: linear-gradient(145deg, #2D2D30, #1B1B1D);
  border: 2px solid #00D4AA;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.card-front::before {
  content: '';
  position: absolute;
  inset: 6px;
  border: 1px solid rgba(0, 212, 170, 0.3);
  border-radius: 4px;
}

.card-front-pattern {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card-front svg {
  width: 40px;
  height: 40px;
  opacity: 0.7;
}

.card-back {
  background: linear-gradient(145deg, #363638, #2D2D30);
  border: 2px solid #7B68EE;
  border-radius: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px;
  text-align: center;
}

.card-back .card-numeral {
  font-family: 'Cinzel Decorative', serif;
  font-size: 0.65rem;
  color: #00D4AA;
  margin-bottom: 4px;
}

.card-back .card-icon {
  font-size: 1.8rem;
  margin-bottom: 4px;
}

.card-back .card-name {
  font-family: 'Cinzel Decorative', serif;
  font-size: 0.55rem;
  color: #FFFFFF;
  line-height: 1.2;
}

.card-back .card-name-zh {
  font-size: 0.7rem;
  color: #4DDFC4;
  margin-top: 2px;
}

/* Spread intro animation */
.tarot-spread .tarot-card {
  opacity: 0;
  transform: translateY(30px) rotateZ(-5deg);
}

.tarot-spread.spread-active .tarot-card {
  opacity: 1;
  transform: translateY(0) rotateZ(0);
}

.tarot-spread.spread-active .tarot-card:nth-child(1) { transition-delay: 0.1s; }
.tarot-spread.spread-active .tarot-card:nth-child(2) { transition-delay: 0.2s; }
.tarot-spread.spread-active .tarot-card:nth-child(3) { transition-delay: 0.3s; }
.tarot-spread.spread-active .tarot-card:nth-child(4) { transition-delay: 0.4s; }
.tarot-spread.spread-active .tarot-card:nth-child(5) { transition-delay: 0.5s; }

/* Selected card glow */
.tarot-card.selected {
  z-index: 20;
  transform: translateY(-20px) scale(1.1);
}

.tarot-card.selected .card-inner {
  box-shadow: 0 20px 50px rgba(0, 212, 170, 0.4), 0 0 30px rgba(123, 104, 238, 0.3);
}

/* Spread instruction text */
.spread-instruction {
  text-align: center;
  color: #A89B94;
  font-size: 0.875rem;
  margin-bottom: 1rem;
  animation: pulse 2s ease-in-out infinite;
}

/* Responsive tarot cards */
@media (min-width: 640px) {
  .tarot-card {
    width: 100px;
    height: 160px;
  }
  .tarot-spread {
    gap: 1rem;
  }
  .card-back .card-numeral { font-size: 0.75rem; }
  .card-back .card-icon { font-size: 2.2rem; }
  .card-back .card-name { font-size: 0.65rem; }
  .card-back .card-name-zh { font-size: 0.85rem; }
}

/* ═══════════════════════════════════════════════════════════════
   全螢幕沉浸式塔羅牌抽牌 Overlay
   ═══════════════════════════════════════════════════════════════ */

/* Overlay 容器 - GitKraken Teal 版 */
.tarot-overlay {
  position: fixed;
  inset: 0;
  z-index: 9998;
  background: radial-gradient(ellipse at center, #2D2D30 0%, #1B1B1D 70%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  animation: overlayFadeIn 0.6s ease-out forwards;
}

.tarot-overlay.closing {
  animation: overlayFadeOut 0.5s ease-out forwards;
}

@keyframes overlayFadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes overlayFadeOut {
  from { opacity: 1; }
  to { opacity: 0; }
}

/* Overlay 標題 */
.overlay-header {
  position: absolute;
  top: 8%;
  text-align: center;
  z-index: 10;
}

.overlay-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 1.75rem;
  color: #00D4AA;
  margin-bottom: 0.5rem;
  text-shadow: 0 0 30px rgba(0, 212, 170, 0.4);
}

@media (min-width: 640px) {
  .overlay-title { font-size: 2.25rem; }
}

.overlay-subtitle {
  color: #A89B94;
  font-size: 1rem;
}

/* 關閉按鈕 - GitKraken Teal 版 */
.overlay-close {
  position: absolute;
  top: 1.5rem;
  right: 1.5rem;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: rgba(123, 104, 238, 0.1);
  border: 1px solid rgba(123, 104, 238, 0.3);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
  z-index: 20;
}

.overlay-close:hover {
  background: rgba(123, 104, 238, 0.25);
  box-shadow: 0 0 20px rgba(0, 212, 170, 0.4);
}

/* 洗牌動畫容器 */
.shuffle-container {
  position: relative;
  width: 100px;
  height: 160px;
  perspective: 1000px;
}

@media (min-width: 640px) {
  .shuffle-container {
    width: 120px;
    height: 190px;
  }
}

/* 洗牌中的牌卡 - GitKraken Teal 版 */
.shuffle-card {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 10px;
  background: linear-gradient(145deg, #2D2D30, #1B1B1D);
  border: 2px solid #00D4AA;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

.shuffle-card svg {
  width: 50%;
  height: 50%;
  opacity: 0.6;
}

.shuffle-card:nth-child(1) {
  z-index: 5;
  animation: shuffleTop 0.6s ease-in-out infinite;
}
.shuffle-card:nth-child(2) {
  z-index: 4;
  animation: shuffleMid 0.6s ease-in-out 0.15s infinite;
}
.shuffle-card:nth-child(3) {
  z-index: 3;
  animation: shuffleBot 0.6s ease-in-out 0.3s infinite;
}

@keyframes shuffleTop {
  0%, 100% { transform: translateX(0) translateY(0) rotate(0deg); }
  25% { transform: translateX(-30px) translateY(-10px) rotate(-8deg); }
  75% { transform: translateX(30px) translateY(-10px) rotate(8deg); }
}

@keyframes shuffleMid {
  0%, 100% { transform: translateX(0) translateY(0) rotate(0deg); }
  25% { transform: translateX(20px) translateY(-5px) rotate(5deg); }
  75% { transform: translateX(-20px) translateY(-5px) rotate(-5deg); }
}

@keyframes shuffleBot {
  0%, 100% { transform: translateX(0) translateY(0) rotate(0deg); }
  25% { transform: translateX(-15px) translateY(5px) rotate(-3deg); }
  75% { transform: translateX(15px) translateY(5px) rotate(3deg); }
}

/* 選牌提示 - GitKraken Teal 版 */
.overlay-instruction {
  position: absolute;
  bottom: 10%;
  color: #4DDFC4;
  font-size: 1rem;
  text-align: center;
  animation: pulse 2s ease-in-out infinite;
}

@media (min-width: 640px) {
  .overlay-instruction { font-size: 1.125rem; }
}

/* ─────────────────────────────────────────────────────────────
   扇形牌陣
   ───────────────────────────────────────────────────────────── */
.tarot-fan {
  position: relative;
  width: 100%;
  height: 300px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}

@media (min-width: 640px) {
  .tarot-fan { height: 380px; }
}

/* 扇形中的牌卡 (比對話框版大) */
.tarot-fan .tarot-card {
  position: absolute;
  width: 90px;
  height: 145px;
  transform-origin: bottom center;
  transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  cursor: pointer;
}

@media (min-width: 640px) {
  .tarot-fan .tarot-card {
    width: 120px;
    height: 190px;
  }
}

@media (min-width: 1024px) {
  .tarot-fan .tarot-card {
    width: 140px;
    height: 220px;
  }
}

/* 扇形牌入場動畫 */
.tarot-fan .tarot-card {
  opacity: 0;
  transform: translateY(100px) rotate(0deg) scale(0.8);
}

.tarot-fan.fan-active .tarot-card {
  opacity: 1;
}

/* Hover 效果 - GitKraken Teal 版 */
.tarot-fan .tarot-card:hover:not(.selected):not(.disabled) {
  z-index: 100 !important;
  filter: drop-shadow(0 15px 35px rgba(0, 212, 170, 0.5));
}

/* 選中效果 - GitKraken Teal 版 */
.tarot-fan .tarot-card.selected {
  z-index: 200 !important;
  filter: drop-shadow(0 25px 50px rgba(0, 212, 170, 0.5));
}

.tarot-fan .tarot-card.selected .card-inner {
  transform: rotateY(180deg);
}

/* 禁用效果 */
.tarot-fan .tarot-card.disabled {
  opacity: 0.2;
  filter: grayscale(0.5);
  pointer-events: none;
  transition: all 0.8s ease-out;
}

/* 扇形牌卡的 card-inner 與 card-back 調整 */
.tarot-fan .card-back .card-numeral { font-size: 0.75rem; }
.tarot-fan .card-back .card-icon { font-size: 2rem; }
.tarot-fan .card-back .card-name { font-size: 0.6rem; }
.tarot-fan .card-back .card-name-zh { font-size: 0.8rem; }

@media (min-width: 640px) {
  .tarot-fan .card-back .card-numeral { font-size: 0.875rem; }
  .tarot-fan .card-back .card-icon { font-size: 2.5rem; }
  .tarot-fan .card-back .card-name { font-size: 0.7rem; }
  .tarot-fan .card-back .card-name-zh { font-size: 1rem; }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* Prompt card hover */
.prompt-card {
  transition: all 0.25s ease-out;
}
.prompt-card:hover {
  background: rgba(45,45,48,0.9);
  border-color: rgba(0,212,170,0.4);
  transform: translateX(4px);
}

/* Send button pulse */
.send-btn {
  transition: all 0.2s ease-out;
}
.send-btn:hover:not(:disabled) {
  box-shadow: 0 0 20px rgba(0,212,170,0.5);
  transform: scale(1.05);
}
.send-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
</style>
</head>

<body class="bg-void text-pale font-sans noise-overlay">

<!-- ═══════════════════════════════════════════════════════════════
     MAIN APP CONTAINER
     ═══════════════════════════════════════════════════════════════ -->
<div id="app" class="h-screen flex flex-col">

  <!-- ─────────────────────────────────────────────────────────────
       HEADER
       ───────────────────────────────────────────────────────────── -->
  <header class="flex-shrink-0 px-4 py-3 flex items-center justify-between border-b border-orchid/10 bg-abyss/50 backdrop-blur-sm z-10">
    <div class="flex items-center gap-3">
      <!-- Sigil Logo -->
      <div class="w-10 h-10 sigil-glow animate-float">
        <svg viewBox="0 0 100 100" class="w-full h-full">
          <circle cx="50" cy="50" r="45" fill="none" stroke="#00D4AA" stroke-width="1" stroke-dasharray="4 6" opacity="0.6"/>
          <circle cx="50" cy="50" r="35" fill="none" stroke="#7B68EE" stroke-width="0.5" opacity="0.8"/>
          <polygon points="50,20 75,65 25,65" fill="none" stroke="#7B68EE" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.6"/>
          <polygon points="50,80 25,35 75,35" fill="none" stroke="#7B68EE" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.6"/>
          <circle cx="50" cy="50" r="4" fill="#00D4AA" opacity="0.9"/>
        </svg>
      </div>
      <h1 class="font-display text-lg text-gold tracking-wider">TarotFriend</h1>
    </div>

    <div class="flex items-center gap-2">
      <!-- History Button -->
      <button class="p-2 rounded-full hover:bg-nebula transition-colors cursor-pointer" title="對話紀錄" aria-label="對話紀錄">
        <i data-lucide="history" class="w-5 h-5 text-ghost"></i>
      </button>
      <!-- Settings Button -->
      <button class="p-2 rounded-full hover:bg-nebula transition-colors cursor-pointer" title="設定" aria-label="設定">
        <i data-lucide="settings" class="w-5 h-5 text-ghost"></i>
      </button>
    </div>
  </header>

  <!-- ─────────────────────────────────────────────────────────────
       CHAT AREA (Scrollable)
       ───────────────────────────────────────────────────────────── -->
  <main id="chatArea" class="flex-1 overflow-y-auto px-4 py-6 emotion-calm">
    <div class="max-w-2xl mx-auto space-y-4">

      <!-- ═══════════════════════════════════════════════════════════
           WELCOME SCREEN (shown when no messages)
           ═══════════════════════════════════════════════════════════ -->
      <div id="welcomeScreen" class="flex flex-col items-center justify-center min-h-[60vh] animate-fade-in">

        <!-- Animated Sigil -->
        <div class="w-24 h-24 mb-8 sigil-glow animate-float">
          <svg viewBox="0 0 100 100" class="w-full h-full">
            <circle cx="50" cy="50" r="45" fill="none" stroke="#00D4AA" stroke-width="1" stroke-dasharray="4 6" opacity="0.5"/>
            <circle cx="50" cy="50" r="38" fill="none" stroke="#00D4AA" stroke-width="0.5" stroke-dasharray="2 4" opacity="0.3"/>
            <circle cx="50" cy="50" r="30" fill="none" stroke="#7B68EE" stroke-width="0.5" opacity="0.6"/>
            <polygon points="50,15 80,70 20,70" fill="none" stroke="#7B68EE" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.5"/>
            <polygon points="50,85 20,30 80,30" fill="none" stroke="#7B68EE" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.5"/>
            <circle cx="50" cy="50" r="5" fill="#00D4AA" opacity="0.8"/>
            <circle cx="50" cy="50" r="2" fill="#1B1B1D"/>
          </svg>
        </div>

        <!-- Welcome Message -->
        <div class="text-center mb-8">
          <h2 class="font-display text-2xl text-pale mb-3">嗨，很高興見到你</h2>
          <p class="text-ghost text-lg">今天的你，過得還好嗎？</p>
        </div>

        <!-- Prompt Suggestions -->
        <div class="w-full max-w-md space-y-3 mb-8">
          <p class="text-ghost text-sm text-center mb-4">選一個話題，或者直接告訴我你在想什麼</p>

          <button class="prompt-card w-full text-left px-5 py-4 rounded-xl bg-abyss/60 border border-orchid/15 cursor-pointer group" onclick="selectPrompt('想聊聊感情的事...')">
            <div class="flex items-center gap-3">
              <i data-lucide="heart" class="w-5 h-5 text-rose group-hover:text-gold transition-colors"></i>
              <span class="text-pale/90">想聊聊感情的事...</span>

function autoResize(textarea) {

  textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
}

// ────────────────────────────────────────────────────────────────
// Handle keyboard shortcuts
// ────────────────────────────────────────────────────────────────
function handleKeydown(event) {
  // Submit on Enter (without Shift)
  if (event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault();
    handleSubmit(event);
  }
}

// ────────────────────────────────────────────────────────────────

// ────────────────────────────────────────────────────────────────
// Handle form submission
// ────────────────────────────────────────────────────────────────
function handleSubmit(event) {
  event.preventDefault();

  const text = messageInput.value.trim();
  if (!text || isTyping) return;

  // Add user message
  addMessage('user', text);

  // Clear input
  messageInput.value = '';
  autoResize(messageInput);

  // Show typing indicator
  showTyping();

  // Simulate AI response (replace with real API call)
  setTimeout(() => {
    hideTyping();
    const response = generateMockResponse(text);
    // If response is null, it means a special UI (like tarot spread) was triggered
    if (response !== null) {
      addMessage('ai', response);
    }
  }, 1500 + Math.random() * 1000);
}

// ────────────────────────────────────────────────────────────────
// Add message to chat
// ────────────────────────────────────────────────────────────────
function addMessage(sender, text) {
  // Hide welcome screen on first message
  if (messages.length === 0) {
    welcomeScreen.classList.add('hidden');
    messagesContainer.classList.remove('hidden');
  }

  messages.push({ sender, text, time: new Date() });

  // Create message element
  const msgEl = document.createElement('div');
  msgEl.className = 'animate-fade-in-up';

  if (sender === 'user') {
    msgEl.innerHTML = `
      <div class="flex justify-end">
        <div class="bubble-user px-5 py-3 max-w-[85%]">
          <p class="text-pale leading-relaxed whitespace-pre-wrap">${escapeHtml(text)}</p>
        </div>

    msgEl.innerHTML = `
      <div class="flex items-start gap-3 max-w-[85%]">
        <div class="flex-shrink-0 w-8 h-8 rounded-full bg-orchid/20 flex items-center justify-center">

// ────────────────────────────────────────────────────────────────
// Show/hide typing indicator
// ────────────────────────────────────────────────────────────────
function showTyping() {

function hideTyping() {
  isTyping = false;

// ────────────────────────────────────────────────────────────────
// Scroll chat to bottom
// ────────────────────────────────────────────────────────────────
function scrollToBottom() {
  chatArea.scrollTo({
    top: chatArea.scrollHeight,
    behavior: 'smooth'
  });
}

// ────────────────────────────────────────────────────────────────
// Escape HTML to prevent XSS
// ────────────────────────────────────────────────────────────────
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

/**
 * 顯示扇形牌陣
 * @param {number} numCards - 牌數
 */
function showFanSpread(numCards) {
  const shuffleContainer = document.getElementById('shuffleContainer');
  const fanContainer = document.getElementById('tarotFan');
  const subtitle = document.getElementById('overlaySubtitle');
  const instruction = document.getElementById('overlayInstruction');

  if (!shuffleContainer || !fanContainer) return;

  // 隱藏洗牌動畫
  shuffleContainer.style.display = 'none';

  // 更新標題
  subtitle.textContent = '牌已展開，請憑直覺選擇';

  // 隨機選取牌
  const shuffled = [...tarotDeck].sort(() => Math.random() - 0.5);
  const spreadCards = shuffled.slice(0, numCards);

  // 存儲待選牌
  pendingTarotReading = {
    cards: spreadCards,
    selectedCard: null,
    numCards: numCards,
  };

  // 計算扇形角度
  // 牌數越多，總角度越大
  const totalAngle = numCards <= 3 ? 40 : numCards <= 5 ? 60 : 80;
  const angleStep = totalAngle / (numCards - 1);
  const startAngle = -totalAngle / 2;

  // 生成牌卡 HTML
  fanContainer.innerHTML = spreadCards.map((card, index) => {
    const angle = startAngle + angleStep * index;
    // 計算 Y 偏移（中間的牌更高）
    const yOffset = Math.abs(angle) * 0.8;
    return `
      <div class="tarot-card"
           data-index="${index}"
           onclick="selectCardFromOverlay(${index})"
           style="--angle: ${angle}deg; --y-offset: ${yOffset}px; z-index: ${10 + index};">
        <div class="card-inner">
          <div class="card-front">
            <div class="card-front-pattern">
              <svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="35" fill="none" stroke="#00D4AA" stroke-width="1" opacity="0.6"/>
                <polygon points="50,20 75,65 25,65" fill="none" stroke="#7B68EE" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.5"/>
                <polygon points="50,80 25,35 75,35" fill="none" stroke="#7B68EE" stroke-width="0.5" stroke-dasharray="3 4" opacity="0.5"/>
                <circle cx="50" cy="50" r="5" fill="#00D4AA" opacity="0.8"/>
              </svg>
            </div>
          </div>
          <div class="card-back">
            <span class="card-numeral">${card.numeral}</span>
            <span class="card-icon">${card.icon}</span>
            <span class="card-name">${card.name}</span>
            <span class="card-name-zh">${card.nameZh}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');

  // 顯示牌陣
  fanContainer.style.display = 'flex';

  // 依序入場動畫
  const cards = fanContainer.querySelectorAll('.tarot-card');
  cards.forEach((card, i) => {
    const angle = startAngle + angleStep * i;
    const yOffset = Math.abs(angle) * 0.8;

    setTimeout(() => {
      card.style.opacity = '1';
      card.style.transform = `translateY(-${yOffset}px) rotate(${angle}deg) scale(1)`;
    }, 100 + i * 120);
  });

  // 所有牌入場後，啟用 fan-active 並顯示提示
  setTimeout(() => {
    fanContainer.classList.add('fan-active');
    instruction.style.display = 'block';
  }, 100 + numCards * 120 + 200);
}

/**
 * 從 Overlay 選擇牌卡
 * @param {number} index - 牌的索引
 */
function selectCardFromOverlay(index) {
  if (!pendingTarotReading || pendingTarotReading.selectedCard !== null) return;

  const fanContainer = document.getElementById('tarotFan');
  const instruction = document.getElementById('overlayInstruction');
  const subtitle = document.getElementById('overlaySubtitle');

  if (!fanContainer) return;

  const cards = fanContainer.querySelectorAll('.tarot-card');
  const selectedCard = pendingTarotReading.cards[index];

  // 標記已選
  pendingTarotReading.selectedCard = selectedCard;

  // 隱藏提示
  if (instruction) instruction.style.display = 'none';
  if (subtitle) subtitle.textContent = selectedCard.nameZh;

  // 計算讓選中牌置中的位置
  const numCards = pendingTarotReading.numCards;
  const totalAngle = numCards <= 3 ? 40 : numCards <= 5 ? 60 : 80;
  const angleStep = totalAngle / (numCards - 1);
  const startAngle = -totalAngle / 2;

  // 動畫：選中牌置中放大翻轉，其他牌淡出
  cards.forEach((card, i) => {
    if (i === index) {
      card.classList.add('selected');
      // 移到中央並放大
      card.style.transform = 'translateY(-100px) rotate(0deg) scale(1.3)';
      card.style.zIndex = '200';
    } else {
      card.classList.add('disabled');
      // 稍微縮小並淡出
      const angle = startAngle + angleStep * i;
      card.style.transform = `translateY(50px) rotate(${angle * 0.5}deg) scale(0.7)`;
    }
  });

  // 翻牌後關閉 Overlay 並回到對話
  setTimeout(() => {
    closeTarotOverlay();

    // 短暫延遲後在對話中顯示解讀
    setTimeout(() => {
      showTarotReading(selectedCard);
    }, 400);
  }, 1500);
}

/**
 * 關閉塔羅 Overlay
 */
function closeTarotOverlay() {
  const overlay = document.getElementById('tarotOverlay');
  if (!overlay) return;

  overlay.classList.add('closing');

  setTimeout(() => {
    overlay.remove();
  }, 500);
}

/**
 * 顯示塔羅牌解讀（在對話區）
 * @param {object} card - 牌卡資料
 */
function showTarotReading(card) {
  // 確保對話區可見
  if (messages.length === 0) {
    welcomeScreen.classList.add('hidden');
    messagesContainer.classList.remove('hidden');
  }

  showTyping();

  setTimeout(() => {
    hideTyping();

    const readingText = `✨ ${card.icon} ${card.nameZh} (${card.name}) ${card.icon} ✨

${card.meaning}

這張牌出現在這個時刻，是宇宙想要告訴你的訊息。讓它在心中沉澱一下，你會慢慢感受到它的意義。

如果你想更深入了解這張牌，或者有其他想聊的，隨時告訴我。`;

    addMessage('ai', readingText);

    // 清除暫存
    pendingTarotReading = null;
  }, 800 + Math.random() * 400);
}
