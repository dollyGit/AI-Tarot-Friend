<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maya Forest — 你的森林精靈朋友</title>
<meta name="description" content="在魔法森林裡，你的精靈朋友正等著你。一起探索塔羅的智慧，傾聽內心的聲音。">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Quicksand:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Lucide Icons -->
<script src="https://unpkg.com/lucide@latest"></script>

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        // Forest Fairy Palette — 有機森林風
        canopy: '#0b1a12',     // 最深背景（森林樹冠）
        moss: '#122618',       // 聊天區背景（苔蘚綠）
        fern: '#1a3324',       // Hover 狀態（蕨類綠）
        bark: '#2a1f15',       // 輸入框背景（樹皮棕）
        fairy: '#7af5c8',      // 主強調色（精靈綠光）
        firefly: '#f4d03f',    // 螢火蟲金黃
        moonlight: '#c8d8e4',  // 月光藍白
        dewdrop: '#a8e6cf',    // 露珠柔綠
        moonbeam: '#f0ede6',   // 主要文字（暖白月光）
        mist: '#8a9a8e',       // 次要文字（森林霧氣）
        petal: '#f8b4c8',      // 花瓣粉（情感溫暖）
        amber: '#d4a574',      // 琥珀暖色
      },
      fontFamily: {
        display: ['Cinzel Decorative', 'serif'],
        sans: ['Quicksand', 'Noto Sans TC', 'sans-serif'],
      },
      animation: {
        'fade-in': 'fadeIn 0.3s ease-out',
        'fade-in-up': 'fadeInUp 0.4s ease-out',
        'pulse-slow': 'pulse 3s ease-in-out infinite',
        'float': 'float 6s ease-in-out infinite',
        'fairy-float': 'fairyFloat 4s ease-in-out infinite',
        'typing-1': 'typing 1.4s ease-in-out infinite',
        'typing-2': 'typing 1.4s ease-in-out 0.2s infinite',
        'typing-3': 'typing 1.4s ease-in-out 0.4s infinite',
      },
      keyframes: {
        fadeIn: {
          '0%': { opacity: '0' },
          '100%': { opacity: '1' },
        },
        fadeInUp: {
          '0%': { opacity: '0', transform: 'translateY(10px)' },
          '100%': { opacity: '1', transform: 'translateY(0)' },
        },
        float: {
          '0%, 100%': { transform: 'translateY(0)' },
          '50%': { transform: 'translateY(-8px)' },
        },
        fairyFloat: {
          '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
          '33%': { transform: 'translateY(-4px) rotate(2deg)' },
          '66%': { transform: 'translateY(-2px) rotate(-1deg)' },
        },
        typing: {
          '0%, 100%': { opacity: '0.3', transform: 'scale(0.8)' },
          '50%': { opacity: '1', transform: 'scale(1)' },
        },
      },
    },
  },
}
</script>

<style>
/* ═══════════════════════════════════════════════════════════════
   BASE RESETS & ATMOSPHERE
   ═══════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; }
body { margin: 0; overflow: hidden; }

/* Scrollbar — fairy→firefly gradient */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: linear-gradient(180deg, #7af5c8, #f4d03f);
  border-radius: 3px;
}
* { scrollbar-width: thin; scrollbar-color: #7af5c8 transparent; }

/* ─────────────────────────────────────────────────────────────
   NOISE OVERLAY (subtle green-tinted)
   ───────────────────────────────────────────────────────────── */
.noise-overlay::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: 9999;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.02'/%3E%3C/svg%3E");
  opacity: 0.25;
}

/* ─────────────────────────────────────────────────────────────
   FIREFLY PARTICLES
   ───────────────────────────────────────────────────────────── */
.firefly {
  position: fixed;
  width: 4px;
  height: 4px;
  background: #f4d03f;
  border-radius: 50%;
  box-shadow: 0 0 8px 3px rgba(244,208,63,0.4), 0 0 16px 6px rgba(244,208,63,0.15);
  pointer-events: none;
  z-index: 10;
  animation: fireflyGlow 3s ease-in-out infinite;
}

.firefly:nth-child(odd) { width: 3px; height: 3px; }
.firefly:nth-child(3n) { width: 5px; height: 5px; }

@keyframes fireflyDrift1 {
  0%, 100% { transform: translate(0, 0); }
  25% { transform: translate(30px, -50px); }
  50% { transform: translate(-20px, -80px); }
  75% { transform: translate(40px, -30px); }
}
@keyframes fireflyDrift2 {
  0%, 100% { transform: translate(0, 0); }
  25% { transform: translate(-40px, -30px); }
  50% { transform: translate(25px, -60px); }
  75% { transform: translate(-15px, -45px); }
}
@keyframes fireflyDrift3 {
  0%, 100% { transform: translate(0, 0); }
  25% { transform: translate(20px, -70px); }
  50% { transform: translate(-35px, -40px); }
  75% { transform: translate(10px, -55px); }
}
@keyframes fireflyGlow {
  0%, 100% { opacity: 0.15; }
  50% { opacity: 0.85; }
}

/* ─────────────────────────────────────────────────────────────
   GROUND MIST
   ───────────────────────────────────────────────────────────── */
.ground-mist::after {
  content: '';
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 100px;
  background: linear-gradient(to top, rgba(11,26,18,0.7), rgba(11,26,18,0.3) 40%, transparent);
  pointer-events: none;
  z-index: 5;
  animation: mistPulse 10s ease-in-out infinite;
}
@keyframes mistPulse {
  0%, 100% { opacity: 0.7; height: 100px; }
  50% { opacity: 1; height: 120px; }
}

/* ─────────────────────────────────────────────────────────────
   MOONLIGHT BEAM
   ───────────────────────────────────────────────────────────── */
.moonlight-beam::before {
  content: '';
  position: fixed;
  top: -200px;
  right: -100px;
  width: 500px;
  height: 500px;
  background: conic-gradient(from 200deg, transparent 0%, rgba(200,216,228,0.04) 8%, transparent 16%);
  animation: moonSway 25s ease-in-out infinite;
  pointer-events: none;
  z-index: 1;
  filter: blur(2px);
}
@keyframes moonSway {
  0%, 100% { transform: rotate(0deg); }
  50% { transform: rotate(8deg); }
}

/* ─────────────────────────────────────────────────────────────
   TREE SILHOUETTES (desktop only)
   ───────────────────────────────────────────────────────────── */
.tree-left, .tree-right {
  position: fixed;
  bottom: 0;
  pointer-events: none;
  z-index: 2;
}
.tree-left {
  left: 0;
  width: 70px;
  height: 100vh;
  background: linear-gradient(to right, rgba(5,12,7,0.4), transparent);
  clip-path: polygon(0% 100%, 0% 0%, 15% 0%, 25% 15%, 18% 20%, 30% 30%, 22% 35%, 35% 45%, 25% 50%, 30% 55%, 20% 60%, 28% 70%, 15% 75%, 20% 85%, 10% 90%, 15% 95%, 0% 100%);
}
.tree-right {
  right: 0;
  width: 60px;
  height: 100vh;
  background: linear-gradient(to left, rgba(5,12,7,0.3), transparent);
  clip-path: polygon(100% 100%, 100% 10%, 85% 15%, 90% 25%, 75% 30%, 82% 40%, 70% 45%, 78% 55%, 68% 60%, 80% 70%, 72% 75%, 85% 85%, 78% 90%, 90% 95%, 100% 100%);
}

@media (max-width: 767px) {
  .tree-left, .tree-right { display: none; }
}

/* ─────────────────────────────────────────────────────────────
   EMOTION GRADIENT BACKGROUNDS — Forest Organic
   ───────────────────────────────────────────────────────────── */
.emotion-calm { background: radial-gradient(ellipse at center, rgba(122,245,200,0.04) 0%, transparent 70%); }
.emotion-anxious { background: radial-gradient(ellipse at center, rgba(200,216,228,0.05) 0%, transparent 70%); }
.emotion-sad { background: radial-gradient(ellipse at center, rgba(248,180,200,0.04) 0%, transparent 70%); }
.emotion-hopeful { background: radial-gradient(ellipse at center, rgba(244,208,63,0.06) 0%, transparent 70%); }

/* ─────────────────────────────────────────────────────────────
   CHAT BUBBLES — Organic Leaf Shapes
   ───────────────────────────────────────────────────────────── */
.bubble-ai {
  background: linear-gradient(135deg, #1a3324, #122618);
  border-left: 3px solid #7af5c8;
  border-radius: 4px 24px 24px 18px;
  box-shadow: 0 2px 12px rgba(122,245,200,0.06);
}

.bubble-user {
  background: linear-gradient(135deg, #2a1f15, #1a3324);
  border-right: 3px solid #a8e6cf;
  border-radius: 24px 4px 18px 24px;
  box-shadow: 0 2px 12px rgba(168,230,207,0.04);
}

/* ─────────────────────────────────────────────────────────────
   FAIRY AVATAR
   ───────────────────────────────────────────────────────────── */
.fairy-avatar {
  border-radius: 50%;
  background: radial-gradient(circle, rgba(122,245,200,0.15), rgba(122,245,200,0.05));
  box-shadow: 0 0 20px rgba(122,245,200,0.2), 0 0 40px rgba(122,245,200,0.08);
  animation: fairyFloat 4s ease-in-out infinite;
}
.fairy-avatar-sm {
  border-radius: 50%;
  background: radial-gradient(circle, rgba(122,245,200,0.12), transparent);
  box-shadow: 0 0 12px rgba(122,245,200,0.15);
}

/* ─────────────────────────────────────────────────────────────
   INPUT GLOW — Forest Green
   ───────────────────────────────────────────────────────────── */
.input-glow:focus {
  box-shadow: 0 0 0 1px #7af5c8, 0 0 20px rgba(122,245,200,0.15);
}

/* ─────────────────────────────────────────────────────────────
   QUICK ACTION PILLS — Forest Organic
   ───────────────────────────────────────────────────────────── */
.action-pill {
  transition: all 0.2s ease-out;
}
.action-pill:hover {
  background: rgba(122,245,200,0.12);
  transform: translateY(-1px);
  border-color: rgba(122,245,200,0.3);
}

/* ─────────────────────────────────────────────────────────────
   SIGIL → FOREST MANDALA
   ───────────────────────────────────────────────────────────── */
.sigil-glow {
  filter: drop-shadow(0 0 20px rgba(122,245,200,0.4));
}

/* ─────────────────────────────────────────────────────────────
   CARD FLIP ANIMATION (preserved from V1)
   ───────────────────────────────────────────────────────────── */
.card-flip {
  transform-style: preserve-3d;
  transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.card-flip.flipped { transform: rotateY(180deg); }
.card-front, .card-back { backface-visibility: hidden; position: absolute; inset: 0; }
.card-back { transform: rotateY(180deg); }

/* ─────────────────────────────────────────────────────────────
   TAROT CARD SPREAD (in-chat version)
   ───────────────────────────────────────────────────────────── */
.tarot-spread {
  display: flex;
  justify-content: center;
  gap: 0.5rem;
  perspective: 1000px;
  padding: 1rem 0;
}

.tarot-card {
  width: 80px;
  height: 130px;
  cursor: pointer;
  position: relative;
  transform-style: preserve-3d;
  transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.tarot-card:hover:not(.selected):not(.disabled) {
  transform: translateY(-12px) scale(1.05);
  z-index: 10;
}

.tarot-card:hover:not(.selected):not(.disabled) .card-inner {
  box-shadow: 0 15px 40px rgba(122, 245, 200, 0.35);
}

.tarot-card.disabled {
  opacity: 0.4;
  cursor: default;
  pointer-events: none;
}

.tarot-card.selected .card-inner {
  transform: rotateY(180deg);
}

.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  border-radius: 10px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

/* Card front — forest vine design */
.card-front {
  background: linear-gradient(145deg, #1a3324, #0b1a12);
  border: 2px solid #7af5c8;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.card-front::before {
  content: '';
  position: absolute;
  inset: 6px;
  border: 1px solid rgba(122, 245, 200, 0.2);
  border-radius: 6px;
}

.card-front-pattern {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card-front svg {
  width: 40px;
  height: 40px;
  opacity: 0.7;
}

/* Card back — forest reveal */
.card-back {
  background: linear-gradient(145deg, #1a3324, #122618);
  border: 2px solid #a8e6cf;
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px;
  text-align: center;
}

.card-back .card-numeral {
  font-family: 'Cinzel Decorative', serif;
  font-size: 0.65rem;
  color: #7af5c8;
  margin-bottom: 4px;
}

.card-back .card-icon {
  font-size: 1.8rem;
  margin-bottom: 4px;
}

.card-back .card-name {
  font-family: 'Cinzel Decorative', serif;
  font-size: 0.55rem;
  color: #f0ede6;
  line-height: 1.2;
}

.card-back .card-name-zh {
  font-size: 0.7rem;
  color: #a8e6cf;
  margin-top: 2px;
}

/* Spread intro animation */
.tarot-spread .tarot-card {
  opacity: 0;
  transform: translateY(30px) rotateZ(-5deg);
}

.tarot-spread.spread-active .tarot-card {
  opacity: 1;
  transform: translateY(0) rotateZ(0);
}

.tarot-spread.spread-active .tarot-card:nth-child(1) { transition-delay: 0.1s; }
.tarot-spread.spread-active .tarot-card:nth-child(2) { transition-delay: 0.2s; }
.tarot-spread.spread-active .tarot-card:nth-child(3) { transition-delay: 0.3s; }
.tarot-spread.spread-active .tarot-card:nth-child(4) { transition-delay: 0.4s; }
.tarot-spread.spread-active .tarot-card:nth-child(5) { transition-delay: 0.5s; }

/* Selected card glow */
.tarot-card.selected {
  z-index: 20;
  transform: translateY(-20px) scale(1.1);
}

.tarot-card.selected .card-inner {
  box-shadow: 0 20px 50px rgba(122, 245, 200, 0.4), 0 0 30px rgba(168, 230, 207, 0.3);
}

/* Spread instruction text */
.spread-instruction {
  text-align: center;
  color: #8a9a8e;
  font-size: 0.875rem;
  margin-bottom: 1rem;
  animation: pulse 2s ease-in-out infinite;
}

/* Responsive tarot cards */
@media (min-width: 640px) {
  .tarot-card {
    width: 100px;
    height: 160px;
  }
  .tarot-spread {
    gap: 1rem;
  }
  .card-back .card-numeral { font-size: 0.75rem; }
  .card-back .card-icon { font-size: 2.2rem; }
  .card-back .card-name { font-size: 0.65rem; }
  .card-back .card-name-zh { font-size: 0.85rem; }
}

/* ═══════════════════════════════════════════════════════════════
   全螢幕沉浸式塔羅牌 — 森林祭壇 Overlay
   ═══════════════════════════════════════════════════════════════ */

/* Overlay — Forest Altar */
.tarot-overlay {
  position: fixed;
  inset: 0;
  z-index: 9998;
  background: radial-gradient(ellipse at center, #1a3324 0%, #0b1a12 60%, #050d08 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  animation: overlayFadeIn 0.6s ease-out forwards;
}

.tarot-overlay.closing {
  animation: overlayFadeOut 0.5s ease-out forwards;
}

@keyframes overlayFadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes overlayFadeOut {
  from { opacity: 1; }
  to { opacity: 0; }
}

/* Overlay firefly enhancement */
.tarot-overlay .overlay-firefly {
  position: absolute;
  width: 5px;
  height: 5px;
  background: #f4d03f;
  border-radius: 50%;
  box-shadow: 0 0 12px 4px rgba(244,208,63,0.5);
  pointer-events: none;
  animation: fireflyGlow 2.5s ease-in-out infinite;
}

/* Overlay header */
.overlay-header {
  position: absolute;
  top: 8%;
  text-align: center;
  z-index: 10;
}

.overlay-title {
  font-family: 'Cinzel Decorative', serif;
  font-size: 1.75rem;
  color: #7af5c8;
  margin-bottom: 0.5rem;
  text-shadow: 0 0 30px rgba(122, 245, 200, 0.4), 0 0 60px rgba(122, 245, 200, 0.15);
}

@media (min-width: 640px) {
  .overlay-title { font-size: 2.25rem; }
}

.overlay-subtitle {
  color: #8a9a8e;
  font-size: 1rem;
}

/* Close button — forest themed */
.overlay-close {
  position: absolute;
  top: 1.5rem;
  right: 1.5rem;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: rgba(122, 245, 200, 0.08);
  border: 1px solid rgba(122, 245, 200, 0.2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
  z-index: 20;
}

.overlay-close:hover {
  background: rgba(122, 245, 200, 0.18);
  box-shadow: 0 0 20px rgba(122, 245, 200, 0.3);
}

/* Shuffle container */
.shuffle-container {
  position: relative;
  width: 100px;
  height: 160px;
  perspective: 1000px;
}

@media (min-width: 640px) {
  .shuffle-container {
    width: 120px;
    height: 190px;
  }
}

/* Shuffle cards — forest altar */
.shuffle-card {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 10px;
  background: linear-gradient(145deg, #1a3324, #0b1a12);
  border: 2px solid #7af5c8;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}

.shuffle-card svg {
  width: 50%;
  height: 50%;
  opacity: 0.6;
}

.shuffle-card:nth-child(1) {
  z-index: 5;
  animation: shuffleTop 0.6s ease-in-out infinite;
}
.shuffle-card:nth-child(2) {
  z-index: 4;
  animation: shuffleMid 0.6s ease-in-out 0.15s infinite;
}
.shuffle-card:nth-child(3) {
  z-index: 3;
  animation: shuffleBot 0.6s ease-in-out 0.3s infinite;
}

@keyframes shuffleTop {
  0%, 100% { transform: translateX(0) translateY(0) rotate(0deg); }
  25% { transform: translateX(-30px) translateY(-10px) rotate(-8deg); }
  75% { transform: translateX(30px) translateY(-10px) rotate(8deg); }
}

@keyframes shuffleMid {
  0%, 100% { transform: translateX(0) translateY(0) rotate(0deg); }
  25% { transform: translateX(20px) translateY(-5px) rotate(5deg); }
  75% { transform: translateX(-20px) translateY(-5px) rotate(-5deg); }
}

@keyframes shuffleBot {
  0%, 100% { transform: translateX(0) translateY(0) rotate(0deg); }
  25% { transform: translateX(-15px) translateY(5px) rotate(-3deg); }
  75% { transform: translateX(15px) translateY(5px) rotate(3deg); }
}

/* Overlay instruction */
.overlay-instruction {
  position: absolute;
  bottom: 10%;
  color: #a8e6cf;
  font-size: 1rem;
  text-align: center;
  animation: pulse 2s ease-in-out infinite;
}

@media (min-width: 640px) {
  .overlay-instruction { font-size: 1.125rem; }
}

/* ─────────────────────────────────────────────────────────────
   扇形牌陣
   ───────────────────────────────────────────────────────────── */
.tarot-fan {
  position: relative;
  width: 100%;
  height: 300px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}

@media (min-width: 640px) {
  .tarot-fan { height: 380px; }
}

.tarot-fan .tarot-card {
  position: absolute;
  width: 90px;
  height: 145px;
  transform-origin: bottom center;
  transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  cursor: pointer;
}

@media (min-width: 640px) {
  .tarot-fan .tarot-card {
    width: 120px;
    height: 190px;
  }
}

@media (min-width: 1024px) {
  .tarot-fan .tarot-card {
    width: 140px;
    height: 220px;
  }
}

.tarot-fan .tarot-card {
  opacity: 0;
  transform: translateY(100px) rotate(0deg) scale(0.8);
}

.tarot-fan.fan-active .tarot-card {
  opacity: 1;
}

/* Hover — fairy green glow */
.tarot-fan .tarot-card:hover:not(.selected):not(.disabled) {
  z-index: 100 !important;
  filter: drop-shadow(0 15px 35px rgba(122, 245, 200, 0.5));
}

/* Selected — fairy glow */
.tarot-fan .tarot-card.selected {
  z-index: 200 !important;
  filter: drop-shadow(0 25px 50px rgba(122, 245, 200, 0.5));
}

.tarot-fan .tarot-card.selected .card-inner {
  transform: rotateY(180deg);
}

.tarot-fan .tarot-card.disabled {
  opacity: 0.2;
  filter: grayscale(0.5);
  pointer-events: none;
  transition: all 0.8s ease-out;
}

.tarot-fan .card-back .card-numeral { font-size: 0.75rem; }
.tarot-fan .card-back .card-icon { font-size: 2rem; }
.tarot-fan .card-back .card-name { font-size: 0.6rem; }

  { numeral: 'XXI', name: 'The World', nameZh: '世界', icon: '🌍', meaning: '完成、圓滿、成就、整合。一個週期圓滿結束，你已經走過了完整的旅程。' },
];

// DOM Elements
const welcomeScreen = document.getElementById('welcomeScreen');
const messagesContainer = document.getElementById('messagesContainer');
const typingIndicator = document.getElementById('typingIndicator');
const messageInput = document.getElementById('messageInput');
const chatArea = document.getElementById('chatArea');

// ────────────────────────────────────────────────────────────────
// Auto-resize textarea
// ────────────────────────────────────────────────────────────────
function autoResize(textarea) {
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
}

// ────────────────────────────────────────────────────────────────
// Handle keyboard shortcuts
// ────────────────────────────────────────────────────────────────
function handleKeydown(event) {
  if (event.key === 'Enter' && !event.shiftKey) {
    event.preventDefault();
    handleSubmit(event);
  }
}

// ────────────────────────────────────────────────────────────────
// Select prompt from welcome screen
// ────────────────────────────────────────────────────────────────
function selectPrompt(text) {
  messageInput.value = text;
  messageInput.focus();
  autoResize(messageInput);
}

// ────────────────────────────────────────────────────────────────
// Quick action buttons — Forest themed
// ────────────────────────────────────────────────────────────────
function quickAction(type) {
  const prompts = {
    tarot: '想請森林為我抽一張塔羅牌，看看有什麼指引',
    crystal: '精靈朋友，根據我現在的狀態，推薦我適合的魔法石',
    daily: '想知道今天月光帶來什麼預言',
    mood: '最近心情有點複雜，想找你聊聊',
  };
  messageInput.value = prompts[type] || '';
  messageInput.focus();
  autoResize(messageInput);
}

// ────────────────────────────────────────────────────────────────
// Handle form submission
// ────────────────────────────────────────────────────────────────
function handleSubmit(event) {
  event.preventDefault();

  const text = messageInput.value.trim();
  if (!text || isTyping) return;

  addMessage('user', text);

  messageInput.value = '';
  autoResize(messageInput);

  showTyping();

  setTimeout(() => {
    hideTyping();
    const response = generateMockResponse(text);
    if (response !== null) {
      addMessage('ai', response);
    }
  }, 1500 + Math.random() * 1000);
}

// ────────────────────────────────────────────────────────────────
// Add message to chat — with Fairy Avatar
// ────────────────────────────────────────────────────────────────
function addMessage(sender, text) {
  if (messages.length === 0) {
    welcomeScreen.classList.add('hidden');
    messagesContainer.classList.remove('hidden');
  }

  messages.push({ sender, text, time: new Date() });

  const msgEl = document.createElement('div');
  msgEl.className = 'animate-fade-in-up';

  if (sender === 'user') {
    msgEl.innerHTML = `
      <div class="flex justify-end">
        <div class="bubble-user px-5 py-3 max-w-[85%]">
          <p class="text-moonbeam leading-relaxed whitespace-pre-wrap">${escapeHtml(text)}</p>
        </div>
      </div>
    `;
  } else {
    msgEl.innerHTML = `
      <div class="flex items-start gap-3 max-w-[85%]">
        <div class="fairy-avatar-sm flex-shrink-0 w-8 h-8 flex items-center justify-center">
          <svg viewBox="0 0 40 40" class="w-6 h-6">
            <ellipse cx="15" cy="16" rx="5" ry="9" fill="rgba(122,245,200,0.15)" transform="rotate(-10 15 16)"/>
            <ellipse cx="25" cy="16" rx="5" ry="9" fill="rgba(122,245,200,0.15)" transform="rotate(10 25 16)"/>
            <ellipse cx="20" cy="22" rx="4" ry="6" fill="#7af5c8" opacity="0.7"/>
            <circle cx="20" cy="14" r="3.5" fill="#a8e6cf"/>
            <circle cx="20" cy="10" r="1.2" fill="#f4d03f" opacity="0.8"/>
          </svg>
        </div>
        <div class="bubble-ai px-5 py-3">
          <p class="text-moonbeam leading-relaxed whitespace-pre-wrap">${escapeHtml(text)}</p>
        </div>
      </div>
    `;
  }

  messagesContainer.appendChild(msgEl);
  scrollToBottom();
}

// ────────────────────────────────────────────────────────────────
// Show/hide typing indicator
// ────────────────────────────────────────────────────────────────
function showTyping() {
  isTyping = true;
  typingIndicator.classList.remove('hidden');
  scrollToBottom();
}

function hideTyping() {
  isTyping = false;
  typingIndicator.classList.add('hidden');
}

// ────────────────────────────────────────────────────────────────
// Scroll chat to bottom
// ────────────────────────────────────────────────────────────────
function scrollToBottom() {
  chatArea.scrollTo({
    top: chatArea.scrollHeight,
    behavior: 'smooth'
  });
}

// ────────────────────────────────────────────────────────────────
// Escape HTML to prevent XSS
// ────────────────────────────────────────────────────────────────
function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// ════════════════════════════════════════════════════════════════
// 全螢幕沉浸式塔羅牌 — 森林祭壇
// ════════════════════════════════════════════════════════════════

function showTarotOverlay(numCards = 5) {
  if (document.getElementById('tarotOverlay')) return;

  const overlay = document.createElement('div');
  overlay.id = 'tarotOverlay';
  overlay.className = 'tarot-overlay';

  // Generate overlay fireflies
  let fireflyHtml = '';
  for (let i = 0; i < 20; i++) {
    const top = Math.random() * 90 + 5;
    const left = Math.random() * 90 + 5;
    const delay = Math.random() * 4;
    const dur = 2 + Math.random() * 3;
    fireflyHtml += `<div class="overlay-firefly" style="top:${top}%;left:${left}%;animation-delay:${delay}s;animation-duration:${dur}s;"></div>`;
  }

  overlay.innerHTML = `
    ${fireflyHtml}

    <!-- Close Button -->
    <button class="overlay-close" onclick="closeTarotOverlay()" aria-label="回到森林">
      <i data-lucide="x" class="w-6 h-6 text-fairy"></i>
    </button>

    <!-- Header -->
    <div class="overlay-header">
      <h2 class="overlay-title">🌿 森林祭壇 🌿</h2>
      <p class="overlay-subtitle" id="overlaySubtitle">森林的能量正在匯聚...</p>
    </div>

    <!-- Shuffle Animation -->
    <div class="shuffle-container" id="shuffleContainer">
      <div class="shuffle-card">
        <svg viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="35" fill="none" stroke="#7af5c8" stroke-width="1" opacity="0.6"/>
          <path d="M50 20 Q55 35 50 45 Q45 35 50 20Z" fill="#7af5c8" opacity="0.3"/>
          <path d="M50 80 Q55 65 50 55 Q45 65 50 80Z" fill="#7af5c8" opacity="0.3"/>
          <path d="M20 50 Q35 55 45 50 Q35 45 20 50Z" fill="#7af5c8" opacity="0.3"/>
          <path d="M80 50 Q65 55 55 50 Q65 45 80 50Z" fill="#7af5c8" opacity="0.3"/>
          <circle cx="50" cy="50" r="5" fill="#f4d03f" opacity="0.8"/>
        </svg>
      </div>
      <div class="shuffle-card">
        <svg viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="35" fill="none" stroke="#7af5c8" stroke-width="1" opacity="0.6"/>
          <path d="M50 20 Q55 35 50 45 Q45 35 50 20Z" fill="#7af5c8" opacity="0.3"/>
          <path d="M50 80 Q55 65 50 55 Q45 65 50 80Z" fill="#7af5c8" opacity="0.3"/>
          <path d="M20 50 Q35 55 45 50 Q35 45 20 50Z" fill="#7af5c8" opacity="0.3"/>
          <path d="M80 50 Q65 55 55 50 Q65 45 80 50Z" fill="#7af5c8" opacity="0.3"/>
          <circle cx="50" cy="50" r="5" fill="#f4d03f" opacity="0.8"/>
        </svg>
      </div>
      <div class="shuffle-card">
        <svg viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="35" fill="none" stroke="#7af5c8" stroke-width="1" opacity="0.6"/>
          <path d="M50 20 Q55 35 50 45 Q45 35 50 20Z" fill="#7af5c8" opacity="0.3"/>
          <path d="M50 80 Q55 65 50 55 Q45 65 50 80Z" fill="#7af5c8" opacity="0.3"/>
          <path d="M20 50 Q35 55 45 50 Q35 45 20 50Z" fill="#7af5c8" opacity="0.3"/>
          <path d="M80 50 Q65 55 55 50 Q65 45 80 50Z" fill="#7af5c8" opacity="0.3"/>
          <circle cx="50" cy="50" r="5" fill="#f4d03f" opacity="0.8"/>
        </svg>
      </div>
    </div>

    <!-- Fan Spread (hidden initially) -->
    <div class="tarot-fan" id="tarotFan" style="display: none;"></div>

    <!-- Instruction -->
    <p class="overlay-instruction" id="overlayInstruction" style="display: none;">
      用你的直覺，選擇最吸引你的那張牌
    </p>
  `;

  document.body.appendChild(overlay);

  lucide.createIcons({ nodes: overlay.querySelectorAll('[data-lucide]') });

  setTimeout(() => {
    showFanSpread(numCards);
  }, 2500);
}

function showFanSpread(numCards) {
  const shuffleContainer = document.getElementById('shuffleContainer');
  const fanContainer = document.getElementById('tarotFan');
  const subtitle = document.getElementById('overlaySubtitle');
  const instruction = document.getElementById('overlayInstruction');

  if (!shuffleContainer || !fanContainer) return;

  shuffleContainer.style.display = 'none';

  subtitle.textContent = '牌已在祭壇展開，請憑直覺選擇';

  const shuffled = [...tarotDeck].sort(() => Math.random() - 0.5);
  const spreadCards = shuffled.slice(0, numCards);

  pendingTarotReading = {
    cards: spreadCards,
    selectedCard: null,
    numCards: numCards,
  };

  const totalAngle = numCards <= 3 ? 40 : numCards <= 5 ? 60 : 80;
  const angleStep = totalAngle / (numCards - 1);
  const startAngle = -totalAngle / 2;

  fanContainer.innerHTML = spreadCards.map((card, index) => {
    const angle = startAngle + angleStep * index;
    const yOffset = Math.abs(angle) * 0.8;
    return `
      <div class="tarot-card"
           data-index="${index}"
           onclick="selectCardFromOverlay(${index})"
           style="--angle: ${angle}deg; --y-offset: ${yOffset}px; z-index: ${10 + index};">
        <div class="card-inner">
          <div class="card-front">
            <div class="card-front-pattern">
              <svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="35" fill="none" stroke="#7af5c8" stroke-width="1" opacity="0.6"/>
                <path d="M50 20 Q55 35 50 45 Q45 35 50 20Z" fill="#7af5c8" opacity="0.3"/>
                <path d="M50 80 Q55 65 50 55 Q45 65 50 80Z" fill="#7af5c8" opacity="0.3"/>
                <path d="M20 50 Q35 55 45 50 Q35 45 20 50Z" fill="#7af5c8" opacity="0.3"/>
                <path d="M80 50 Q65 55 55 50 Q65 45 80 50Z" fill="#7af5c8" opacity="0.3"/>
                <circle cx="50" cy="50" r="5" fill="#f4d03f" opacity="0.8"/>
              </svg>
            </div>
          </div>
          <div class="card-back">
            <span class="card-numeral">${card.numeral}</span>
            <span class="card-icon">${card.icon}</span>
            <span class="card-name">${card.name}</span>
            <span class="card-name-zh">${card.nameZh}</span>
          </div>
        </div>
      </div>
    `;
  }).join('');

  fanContainer.style.display = 'flex';

  const cards = fanContainer.querySelectorAll('.tarot-card');
  cards.forEach((card, i) => {
    const angle = startAngle + angleStep * i;
    const yOffset = Math.abs(angle) * 0.8;

    setTimeout(() => {
      card.style.opacity = '1';
      card.style.transform = `translateY(-${yOffset}px) rotate(${angle}deg) scale(1)`;
    }, 100 + i * 120);
  });

  setTimeout(() => {
    fanContainer.classList.add('fan-active');
    instruction.style.display = 'block';
  }, 100 + numCards * 120 + 200);
}

function selectCardFromOverlay(index) {
  if (!pendingTarotReading || pendingTarotReading.selectedCard !== null) return;

  const fanContainer = document.getElementById('tarotFan');
  const instruction = document.getElementById('overlayInstruction');
  const subtitle = document.getElementById('overlaySubtitle');

  if (!fanContainer) return;

  const cards = fanContainer.querySelectorAll('.tarot-card');
  const selectedCard = pendingTarotReading.cards[index];

  pendingTarotReading.selectedCard = selectedCard;

  if (instruction) instruction.style.display = 'none';
  if (subtitle) subtitle.textContent = selectedCard.nameZh;

  const numCards = pendingTarotReading.numCards;
  const totalAngle = numCards <= 3 ? 40 : numCards <= 5 ? 60 : 80;
  const angleStep = totalAngle / (numCards - 1);
  const startAngle = -totalAngle / 2;

  cards.forEach((card, i) => {
    if (i === index) {
      card.classList.add('selected');
      card.style.transform = 'translateY(-100px) rotate(0deg) scale(1.3)';
      card.style.zIndex = '200';
    } else {
      card.classList.add('disabled');
      const angle = startAngle + angleStep * i;
      card.style.transform = `translateY(50px) rotate(${angle * 0.5}deg) scale(0.7)`;
    }
  });

  setTimeout(() => {
    closeTarotOverlay();

    setTimeout(() => {
      showTarotReading(selectedCard);
    }, 400);
  }, 1500);
}

function closeTarotOverlay() {
  const overlay = document.getElementById('tarotOverlay');
  if (!overlay) return;

  overlay.classList.add('closing');

  setTimeout(() => {
    overlay.remove();
  }, 500);
}

function showTarotReading(card) {
  if (messages.length === 0) {
    welcomeScreen.classList.add('hidden');
    messagesContainer.classList.remove('hidden');
  }

  showTyping();

  setTimeout(() => {
    hideTyping();

    const readingText = `🌿 ${card.icon} ${card.nameZh} (${card.name}) ${card.icon} 🌿

${card.meaning}

森林的智慧很清楚呢。這張牌出現在這個時刻，是樹靈想要告訴你的訊息。讓它像種子一樣，在心裡慢慢發芽。

如果你想更深入了解這張牌的指引，或者有其他想聊的，隨時告訴我。我就在這棵大樹下等你。`;

    addMessage('ai', readingText);

    pendingTarotReading = null;
  }, 800 + Math.random() * 400);
}

// ────────────────────────────────────────────────────────────────
// Mock AI response — Fairy Speech Patterns
// ────────────────────────────────────────────────────────────────
function generateMockResponse(userText) {
  const lowerText = userText.toLowerCase();

  if (lowerText.includes('塔羅') || lowerText.includes('抽牌') || lowerText.includes('指引') || lowerText.includes('森林') && lowerText.includes('禮物')) {
    setTimeout(() => showTarotOverlay(5), 300);
    return null;
  }

  if (lowerText.includes('感情') || lowerText.includes('愛情') || lowerText.includes('關係') || lowerText.includes('心')) {
    return `嗯...我感覺到了，你心裡有一朵花正等著被看見呢。\n\n你願意多說一些嗎？是正在一段關係裡感到困惑，還是對於要不要讓新的感情走進生命而猶豫？\n\n不管是什麼，這片森林裡只有我們，慢慢說就好。風會幫你保守秘密的。`;
  }

  if (lowerText.includes('工作') || lowerText.includes('職涯') || lowerText.includes('事業')) {
    return `工作的事情啊...我知道那種在路上走著走著，突然不確定方向的感覺。\n\n但你知道嗎？森林裡的小路，看似雜亂，其實每一條都通向某個美麗的地方。\n\n你現在最困擾的是什麼呢？是和身邊的人相處的問題、對手上的事感到疲倦，還是在想著要不要轉個彎走另一條路？`;
  }

  if (lowerText.includes('未來') || lowerText.includes('迷茫') || lowerText.includes('方向') || lowerText.includes('預言')) {
    return `嗯...月光告訴我，你最近一直在想很多很多。\n\n對未來感到迷茫，其實代表你正站在一個重要的路口。很多人都只是閉著眼睛往前走，而你願意停下來問自己真正想要什麼——這需要很大的勇氣呢。\n\n你覺得現在最讓你不確定的是什麼？我們可以一起看看月亮有什麼話想對你說。`;
  }

  if (lowerText.includes('水晶') || lowerText.includes('魔法石')) {
    return `讓我感應一下你現在的能量...嗯，我感覺到你需要一些平靜和療癒呢。\n\n💜 紫水晶森林 (Amethyst)\n在森林深處的紫水晶洞，能幫助你放鬆思緒，找回內心的寧靜。當你感到焦慮的時候，想像自己坐在水晶洞裡，很快就會平靜下來。\n\n🤍 月光石 (Moonstone)\n這是我最喜歡的石頭之一！它和月亮的能量相連，特別適合正在經歷情感波動的你。把它放在月光下充電，然後帶在身邊。\n\n你對哪一顆比較有感覺呢？`;
  }

  if (lowerText.includes('運勢') || lowerText.includes('今天')) {
    return `讓我問問樹葉和星星...\n\n🌙 今日月光預言\n\n今天的森林能量很柔和，適合靜下心來聆聽自己內在的聲音。不需要強迫自己做太多決定，讓事情像落葉一樣自然飄落就好。\n\n💡 精靈提醒：下午時分，可能會有一隻意想不到的蝴蝶飛來——代表好消息即將到來。保持開放的心態去迎接它。\n\n🌿 幸運色：森林綠\n✨ 幸運數字：3\n\n今天還有什麼想問精靈的嗎？`;
  }

  if (lowerText.includes('心情') || lowerText.includes('複雜') || lowerText.includes('聊聊') || lowerText.includes('煩')) {
    return `嗯，我在這裡。這棵大樹的樹洞可以裝下所有的心事，你放心說。\n\n有時候心情複雜，就像森林裡的藤蔓纏在一起，不知道從哪裡開始解。但沒關係，我們可以一根一根慢慢理。\n\n你現在最大的感受是什麼呢？是焦慮、難過、還是一種說不清楚的感覺？`;
  }

  // Default — fairy style
  return `嗯嗯，我聽到了。謝謝你願意在這片森林裡對我說這些。\n\n你知道嗎？每一次願意把心裡的話說出來，都像是在森林裡種下一顆小小的種子。慢慢地，它會長成美麗的花。\n\n你現在感覺怎麼樣呢？如果你願意，可以繼續說說，或者我們也可以到森林祭壇，抽一張牌看看樹靈想告訴你什麼。`;
}
