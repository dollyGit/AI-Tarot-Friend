version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/tarotfriend/platform/gen/go
plugins:
  # Go (for DataAccessLayer)
  - remote: buf.build/protocolbuffers/go
    out: ../DataAccessLayer/pkg/proto
    opt: paths=source_relative

  # Go gRPC
  - remote: buf.build/grpc/go
    out: ../DataAccessLayer/pkg/proto
    opt: paths=source_relative

  # TypeScript (for Node.js services)
  - remote: buf.build/bufbuild/es
    out: ../packages/shared/src/gen
    opt: target=ts

  # TypeScript Connect-RPC
  - remote: buf.build/connectrpc/es
    out: ../packages/shared/src/gen
    opt: target=ts

  # Python (for CaringService)
  - remote: buf.build/protocolbuffers/python
    out: ../CaringService/app/proto

  # Python gRPC
  - remote: buf.build/grpc/python
    out: ../CaringService/app/proto
