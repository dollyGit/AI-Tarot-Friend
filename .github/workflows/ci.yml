# TarotFriend — CI Pipeline
# Triggers on push/PR to main, runs checks for all services

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  GO_VERSION: '1.22'
  PYTHON_VERSION: '3.12'

jobs:
  # ── Shared Package ─────────────────────────────────────
  shared:
    name: Shared Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: packages/shared/package-lock.json
      - run: npm ci
        working-directory: packages/shared
      - run: npm run type-check
        working-directory: packages/shared
      - run: npm run build
        working-directory: packages/shared

  # ── Node.js Services (matrix) ──────────────────────────
  node-services:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: shared
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: CustomerManagement
            directory: CustomerManagement
          - service: ShoppingCart
            directory: ShoppingCart
          - service: TarotistScheduler
            directory: TarotistScheduler
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      # Build shared first
      - run: npm ci && npm run build
        working-directory: packages/shared
      # Service checks
      - run: npm ci
        working-directory: ${{ matrix.directory }}
      - run: npx tsc --noEmit
        working-directory: ${{ matrix.directory }}
      - run: npx prisma generate
        working-directory: ${{ matrix.directory }}

  # ── TarotReading (existing MVP, separate workspace) ────
  tarot-reading:
    name: TarotReading
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
        working-directory: TarotReading/backend
      - run: npx tsc --noEmit
        working-directory: TarotReading/backend
      - run: npx prisma generate
        working-directory: TarotReading/backend
      - run: npm test -- --run
        working-directory: TarotReading/backend
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tarot_test
          JWT_SECRET: test-secret
          REDIS_URL: redis://localhost:6379/1

  # ── CaringService (Python) ─────────────────────────────
  caring-service:
    name: CaringService
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
        working-directory: CaringService
      - run: ruff check .
        working-directory: CaringService
      - run: python -m pytest tests/ -v
        working-directory: CaringService

  # ── DataAccessLayer (Go gRPC) ──────────────────────────
  data-access-layer:
    name: DataAccessLayer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod download
        working-directory: DataAccessLayer
      - run: go vet ./...
        working-directory: DataAccessLayer
      - run: go build ./cmd/dal-server
        working-directory: DataAccessLayer
      - run: go test ./... -v
        working-directory: DataAccessLayer

  # ── Protobuf Lint ──────────────────────────────────────
  proto-lint:
    name: Protobuf Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
      - run: buf lint
        working-directory: proto
      - run: buf build
        working-directory: proto

  # ── Docker Build Check ─────────────────────────────────
  docker-build:
    name: Docker Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: CustomerManagement
            context: CustomerManagement
          - service: ShoppingCart
            context: ShoppingCart
          - service: TarotistScheduler
            context: TarotistScheduler
          - service: CaringService
            context: CaringService
          - service: DataAccessLayer
            context: DataAccessLayer
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -t tarotfriend/${{ matrix.service }}:ci .
        working-directory: ${{ matrix.context }}
